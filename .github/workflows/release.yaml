name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]  # пуш по тегу

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Вход в GitHub Container Registry
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 3. Собираем Docker образ
      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/hdd-destruction:${{ github.ref_name }} .

      # 4. Пушим образ в GHCR
      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/hdd-destruction:${{ github.ref_name }}
